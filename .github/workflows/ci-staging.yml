name: CI - Staging

on:
  push:
    branches: [staging]
  pull_request:
    branches: [staging]

jobs:
  staging-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install all service dependencies
        run: |
          cd src/user-service && npm install
          cd ../product-service && npm install
          cd ../order-service && npm install
          cd ../notification-service && npm install

      - name: Run tests
        run: |
          cd src/user-service && npm test --if-present
          cd ../product-service && npm test --if-present
          cd ../order-service && npm test --if-present
          cd ../notification-service && npm test --if-present

      - name: Build Docker image
        run: docker build -t shopflow-staging:latest .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push staging image
        run: |
          docker tag shopflow-staging:latest ${{ secrets.DOCKER_USERNAME }}/shopflow:staging
          docker push ${{ secrets.DOCKER_USERNAME }}/shopflow:staging

      - name: Confirm staging deploy
        run: echo "✅ Staging image pushed successfully"